<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чек Мазин</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body { font-family: Arial; background: #eee; text-align: center; }
.container { background: white; padding: 20px; width: 320px; margin: 20px auto; border-radius: 10px; }
input { width: 90%; padding: 8px; margin: 5px; }
button { padding: 10px; margin: 5px; cursor: pointer; }
.receipt { background: white; padding: 15px; width: 280px; margin: 20px auto; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.logo-img { display: block; margin: 0 auto 10px; max-width: 100%; height: auto; }
.line { border-top: 3px dashed black; margin: 10px 0; }
.big { font-size: 24px; font-weight: bold; }
.qr-wrapper { text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
    <h2>Создать чек</h2>
    <input id="toy" placeholder="Игрушка"><br>
    <input id="sum" placeholder="Сумма"><br>
    <input id="date" type="date"><br>
    <button onclick="createCheck()">Создать чек</button>
    <button onclick="downloadCheck()">⬇ Скачать PNG</button>
    <button onclick="resetCheck()">Сбросить номер</button>
</div>
<div id="output"></div>

<script>
let checkNumber = localStorage.getItem("checkNumber");
checkNumber = checkNumber ? parseInt(checkNumber) : 1;

function formatCheckNumber(n) { return String(n).padStart(6, '0'); }

function createCheck() {
    let toy = document.getElementById("toy").value;
    let sum = document.getElementById("sum").value;
    let date = document.getElementById("date").value;
    if(!toy || !sum || !date) { alert("Заполни все поля!"); return; }

    document.getElementById("output").innerHTML = `
    <div class="receipt" id="receipt">
        <img src="mazin.png" alt="Мазин" class="logo-img">
        <div class="line"></div>
        <div class="big">ЧЕК</div>
        <p>Дата: <b>${formatDate(date)}</b></p>
        <p>Номер чека: <b>№ ${formatCheckNumber(checkNumber)}</b></p>
        <p style="font-size:20px;">Игрушка: <b>${toy}</b></p>
        <p style="font-size:20px;">СУММА: <b>${sum} грн</b></p>
        <p>Оплата: Готівка <b>${sum} грн</b></p>
        <div class="line"></div>
        <div class="big">СПАСИБО ЗА ПОКУПКУ</div>
        <div class="qr-wrapper">
            <img src="qr.png" width="140" alt="QR-код">
        </div>
    </div>`;
    checkNumber++;
    localStorage.setItem("checkNumber", checkNumber);
}

function formatDate(date) {
    let d = new Date(date);
    return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function downloadCheck() {
    const receipt = document.getElementById("receipt");
    if(!receipt) { alert("Сначала создай чек!"); return; }
    html2canvas(receipt, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
        canvas.toBlob(blob => {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `check_${formatCheckNumber(checkNumber-1)}.png`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }, "image/png");
    }).catch(err => alert("Ошибка: " + err));
}

function resetCheck() {
    localStorage.removeItem("checkNumber");
    checkNumber = 1;
    alert("Номер сброшен на 1");
}
</script>
</body>
</html>
